# Полный vhost для VPS: HTTP → HTTPS + PHP без snippets/fastcgi-php.conf
#
# Установка:
#   sudo cp /etc/nginx/sites-available/sheberkz /etc/nginx/sites-available/sheberkz.bak.$(date +%Y%m%d)
#   sudo nano /etc/nginx/sites-available/sheberkz   # или scp этого файла
#   sudo ln -sf /etc/nginx/sites-available/sheberkz /etc/nginx/sites-enabled/sheberkz
#   sudo nginx -t && sudo systemctl reload nginx
#
# Сокет PHP (при необходимости): ls /var/run/php/php*-fpm.sock

server {
    listen 80;
    listen [::]:80;
    server_name sheberkz.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sheberkz.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/sheberkz.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sheberkz.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/sheber;
    index index.php index.html;
    client_max_body_size 48M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$uri;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ /\. {
        deny all;
    }
}
