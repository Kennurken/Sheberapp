# Скопировать на VPS в /etc/nginx/sites-available/sheberkz
# и включить: ln -s ... sites-enabled/
#
# Проверьте сокет PHP-FPM:
#   ls /var/run/php/php*-fpm.sock
# При необходимости замените php8.1-fpm.sock ниже.

server {
    listen 80;
    listen [::]:80;
    server_name sheberkz.duckdns.org;

    root /var/www/sheber;
    index index.php index.html;

    client_max_body_size 48M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Не использовать snippets/fastcgi-php.conf: там split_path_info ломает URI без хвоста
    # после .php (например /api/ping.php) и даёт 404.
    location ~ \.php$ {
        try_files $uri =404;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$uri;
        fastcgi_pass unix:/var/run/php/php8.1-fpm.sock;
    }

    location ~* \.(jpg|jpeg|png|gif|webp|ico|css|js|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    location ~ /\. {
        deny all;
    }
}

# После установки certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d sheberkz.duckdns.org
# Certbot добавит listen 443 ssl и пути к сертификатам.
